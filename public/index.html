<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudezak</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      min-height: 100dvh;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    #cz-wrap {
      background: #1a1a1a;
      border-radius: 0;
      overflow: hidden;
      width: 100vw;
      height: 100dvh;
      border: 1px solid #333;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      text-transform: uppercase;
    }

    #cz-header {
      background: #111;
      padding: 28px 32px;
      display: flex;
      align-items: flex-start;
      gap: 0;
      border-bottom: 1px solid #2a2a2a;
    }

    #cz-brand { width: min(100%, 46ch); min-width: 0; }
    #cz-name {
      width: 100%;
      font-size: clamp(40px, 6.2vw, 86px);
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      line-height: 0.9;
      white-space: nowrap;
    }
    #cz-tagline { width: 100%; font-size: clamp(17px, 1.9vw, 28px); color: #888; margin-top: 10px; letter-spacing: 1px; line-height: 1.05; white-space: nowrap; }
    #cz-counter { margin-top: 12px; font-size: clamp(12px, 1.2vw, 18px); color: #666; white-space: nowrap; letter-spacing: 1px; text-transform: none; }

    #cz-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex; flex-direction: column; gap: 22px;
      background: #1a1a1a;
      scrollbar-width: thin; scrollbar-color: #333 transparent;
    }

    .msg { display: flex; gap: 0; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .msg.user { flex-direction: row-reverse; }

    .bubble {
      max-width: 85%; padding: 14px 18px;
      border-radius: 4px; font-size: clamp(20px, 2.3vw, 38px); line-height: 1.15; letter-spacing: 0.6px;
      text-transform: none;
    }

    .msg.bot .bubble {
      background: #222; color: #e0e0e0;
      border-left: 3px solid #fff;
      text-transform: uppercase;
    }

    .msg.user .bubble {
      background: #2c2c2c; color: #ccc;
      border-right: 3px solid #555; text-align: right;
      text-transform: none;
    }

    #cz-typing { display: none; align-items: center; gap: 0; padding: 0 0 4px; }
    #cz-typing .bubble { display: flex; gap: 8px; align-items: center; padding: 14px 18px; }

    .dot {
      width: 10px; height: 10px;
      background: #fff; border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

    #cz-input-area {
      border-top: 1px solid #2a2a2a;
      padding: 20px 24px;
      display: flex; gap: 14px; align-items: flex-end;
      background: #111;
    }

    #cz-input {
      flex: 1; background: #222; border: 1px solid #333; border-radius: 4px;
      color: #ddd; font-family: Arial, sans-serif; font-size: clamp(18px, 2vw, 30px);
      padding: 14px 16px; resize: none;
      min-height: 60px; max-height: 220px;
      outline: none; line-height: 1.2;
      text-transform: none;
    }
    #cz-input:focus { border-color: #555; }
    #cz-input::placeholder { color: #555; text-transform: uppercase; }
    #cz-input:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; border-color: #222; }

    #cz-send {
      background: #fff; border: none; border-radius: 4px;
      color: #111; font-family: Arial, sans-serif;
      font-weight: 700; font-size: clamp(16px, 1.6vw, 24px); letter-spacing: 1px;
      padding: 14px 20px; cursor: pointer; height: 60px;
      flex-shrink: 0; transition: background 0.15s;
    }
    #cz-send:hover { background: #d9d9d9; }
    #cz-send:active { background: #bfbfbf; }
    #cz-send:disabled { background: #333; color: #555; cursor: not-allowed; }

    #cz-blocked {
      display: none; text-align: center;
      padding: 22px; background: #111;
      border-top: 1px solid #2a2a2a;
      font-family: Arial, sans-serif;
      font-size: clamp(18px, 2vw, 30px); color: #fff; letter-spacing: 1px;
    }

    #cz-disclaimer {
      text-align: center; font-size: clamp(11px, 1vw, 14px); color: #444;
      padding: 10px 14px; font-family: Arial, sans-serif;
      background: #111;
      border-top: 1px solid #1e1e1e;
      letter-spacing: 0.8px;
      text-transform: none;
    }

    @media (max-width: 480px) {
      body { min-height: 100dvh; }
      #cz-wrap { min-height: 100dvh; }
    }
  </style>
</head>
<body>
<div id="cz-wrap">
  <div id="cz-header">
    <div id="cz-brand">
      <div id="cz-name">CLAUDEZAK</div>
      <div id="cz-tagline">Een kolerelaaier van een AI</div>
      <div id="cz-counter">10 vragen. Meer niet. Voor je eigen bestwil.</div>
    </div>
  </div>

  <div id="cz-messages">
    <div class="msg bot">
      <div class="bubble">Ja, wat moet je?</div>
    </div>
  </div>

  <div id="cz-typing" class="msg bot">
    <div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>

  <div id="cz-input-area">
    <textarea id="cz-input" placeholder="Nou?" rows="1"></textarea>
    <button id="cz-send">STUUR</button>
  </div>
  <div id="cz-blocked"></div>
  <div id="cz-disclaimer">Claudezak zegt wat ie denkt. Niet voor gevoelige types.</div>
</div>

<script>
  const messagesEl = document.getElementById('cz-messages');
  const input = document.getElementById('cz-input');
  const sendBtn = document.getElementById('cz-send');
  const typingEl = document.getElementById('cz-typing');
  const counterEl = document.getElementById('cz-counter');
  const inputArea = document.getElementById('cz-input-area');
  const blockedEl = document.getElementById('cz-blocked');

  const MAX = 10;
  let count = 0;
  const history = [];

  const LIMIT_MSGS = [
    "Dit was je laatste vraag. Loket is dicht. Doei.",
    "Zo. Klaar. Je beurt is op. Ga fietsen stelen.",
    "Limiet gehaald. Mijn geduld ook. Wegwezen.",
    "Zo. Ik vind t welletjes. Je zoek het maar uit verder.",
    "Laatste vraag. Ik kap ermee. Zoek t ff uit",
    "Tot hier. Ik ben er klaar mee. Mazzel.",
    "Ja doei. Opzoute nou.",
  ];

  async function ensureSession() {
    // Get an HttpOnly signed session cookie from the server.
    try {
      await fetch('/api/session', { method: 'GET' });
    } catch {}
  }

  function updateCounter() {
    const left = MAX - count;
    if (left > 1) counterEl.textContent = left + ' vragen over';
    else if (left === 1) counterEl.textContent = 'nog 1 vraag over dus maak er wat van';
    else { counterEl.textContent = 'opgesodemieterd'; counterEl.style.color = '#fff'; }
  }

  function lockDown() {
    inputArea.style.display = 'none';
    blockedEl.style.display = 'block';
    blockedEl.textContent = LIMIT_MSGS[Math.floor(Math.random() * LIMIT_MSGS.length)];
  }

  function addMsg(type, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = String(text ?? '');
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text || count >= MAX) return;

    await ensureSession();

    count++;
    updateCounter();
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    typingEl.style.display = 'flex';
    messagesEl.scrollTop = messagesEl.scrollHeight;

    const isLast = count >= MAX;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, isLast }),
      });

      let data = null;
      try { data = await res.json(); } catch {}
      const reply =
        (res.ok && data && data.reply) ? data.reply :
        (!res.ok && data && (data.reply || data.error)) ? (data.reply || data.error) :
        (!res.ok) ? ('Server zei: ' + res.status) :
        '*zucht* Er ging iets mis. Typisch.';
      history.push({ role: 'assistant', content: reply });
      typingEl.style.display = 'none';
      addMsg('bot', reply);
    } catch (e) {
      typingEl.style.display = 'none';
      addMsg('bot', '*zucht* Server kapot. Jouw schuld.');
    }

    if (isLast) {
      setTimeout(lockDown, 800);
    } else {
      sendBtn.disabled = false;
    }

    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
